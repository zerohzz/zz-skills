# ─────────────────────────────────────────────────────────────────────────────
# USAGE: Copy this file to .github/workflows/interactive-web-deploy.yml
#        in the ROOT of your zz-skills repository clone.
#
# This workflow deploys interactive-web/demo/ to GitHub Pages whenever
# files under interactive-web/ change on the main branch.
#
# After pushing, go to: Settings → Pages → Source → GitHub Actions
# Your site will be live at:
#   https://zerohzz.github.io/zz-skills/interactive-web/demo/
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy interactive-web demo

on:
  push:
    branches: [main]
    paths:
      - 'interactive-web/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload demo artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the full interactive-web directory so that:
          # - demo/index.html is accessible at /interactive-web/demo/
          # - examples/ iframe src="../examples/..." resolves correctly
          path: interactive-web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
