# Deploy interactive-web demo to GitHub Pages when skill files change
name: Deploy interactive-web demo

on:
  push:
    branches: [main]
    paths:
      - 'skills/interactive-web/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload demo artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: skills/interactive-web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
