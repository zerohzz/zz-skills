# sync-from-dev.yml
# ─────────────────────────────────────────────────────────────
# Reference workflow — copy this file to:
#   zerohzz/zz-skills/.github/workflows/sync-from-dev.yml
#
# Required secret in zerohzz/zz-skills:
#   DEV_REPO_PAT — PAT with read access to zerohzz/zz-skills-dev
# ─────────────────────────────────────────────────────────────

name: Sync from Dev

on:
  repository_dispatch:
    types: [sync-from-dev]
  workflow_dispatch:
    inputs:
      message:
        description: 'Commit message (used when triggered manually)'
        default: 'manual sync'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone dev repo
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.DEV_REPO_PAT }}@github.com/zerohzz/zz-skills-dev.git" \
            /tmp/dev

      - name: Rsync public files
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='sync-public.sh' \
            --exclude='scripts/' \
            --exclude='README.md' \
            --exclude='CLAUDE.md' \
            --exclude='.claude/' \
            /tmp/dev/ ./

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to sync — already up to date."
            exit 0
          fi
          MSG="${{ github.event.client_payload.message || github.event.inputs.message || 'sync from dev' }}"
          git commit -m "sync: $MSG"
          git push
